<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hexbound — Hero Card Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary:   #0D1117;
    --bg-secondary: #141B26;
    --bg-tertiary:  #1C2738;
    --bg-abyss:     #060A0F;
    --gold:         #D4A537;
    --gold-bright:  #FFD700;
    --gold-dim:     #8B6914;
    --border:       #2E3D52;
    --text:         #E8DCC8;
    --text-sec:     #A89880;
    --str: #E74C3C;
    --agi: #2ECC71;
    --vit: #E91E63;
    --wis: #9B59B6;
  }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 25%, #1a0f2e 0%, var(--bg-abyss) 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 16px;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ── Частицы ── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute;
    border-radius: 50%;
    animation: rise linear infinite;
  }
  @keyframes rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(-110vh) translateX(var(--drift)); opacity: 0; }
  }

  /* ── Основной враппер ── */
  .page { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 0; }

  /* ── Заголовок ── */
  .page-title {
    text-align: center;
    margin-bottom: 28px;
    animation: slideDown 0.5s ease-out both;
  }
  .page-title .sub { color: var(--text-sec); font-size: 11px; letter-spacing: 3px; margin-bottom: 4px; }
  .page-title .main { font-family: 'Oswald', sans-serif; color: var(--gold); font-size: 28px; letter-spacing: 6px; }
  @keyframes slideDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: translateY(0); } }

  /* ── Карточка ── */
  .card {
    position: relative;
    width: 320px;
    border-radius: 18px;
    background: radial-gradient(ellipse at 50% 0%, var(--bg-tertiary) 0%, var(--bg-secondary) 55%, var(--bg-abyss) 100%);
    border: 1.5px solid rgba(212,165,55,0.35);
    box-shadow: 0 0 22px rgba(212,165,55,0.2), 0 16px 48px rgba(6,10,15,0.9), inset 0 1px 0 rgba(212,165,55,0.15);
    overflow: hidden;
    animation: cardEntry 0.6s cubic-bezier(0.34,1.56,0.64,1) both, floatAnim 4s ease-in-out 0.6s infinite;
    transform-style: preserve-3d;
    cursor: default;
    user-select: none;
    transition: box-shadow 0.3s ease;
  }
  .card:hover {
    box-shadow: 0 0 44px rgba(212,165,55,0.45), 0 24px 64px rgba(6,10,15,0.95), inset 0 1px 0 rgba(212,165,55,0.25);
  }

  @keyframes cardEntry {
    from { opacity:0; transform: translateY(36px) scale(0.92); }
    to   { opacity:1; transform: translateY(0) scale(1); }
  }
  @keyframes floatAnim {
    0%,100% { transform: translateY(0px); }
    50%      { transform: translateY(-7px); }
  }

  /* Угловые скобки */
  .corner { position: absolute; width: 20px; height: 20px; }
  .corner svg { position: absolute; inset: 0; }
  .corner-tl { top: 8px; left: 8px; }
  .corner-tr { top: 8px; right: 8px; transform: rotate(90deg); }
  .corner-br { bottom: 8px; right: 8px; transform: rotate(180deg); }
  .corner-bl { bottom: 8px; left: 8px; transform: rotate(270deg); }

  /* Угловые ромбы */
  .cdiamond {
    position: absolute; width: 8px; height: 8px;
    background: var(--gold); transform: rotate(45deg); opacity: 0.75;
  }
  .cdiamond.tl { top:-4px; left:-4px; }
  .cdiamond.tr { top:-4px; right:-4px; }
  .cdiamond.bl { bottom:-4px; left:-4px; }
  .cdiamond.br { bottom:-4px; right:-4px; }

  /* Внутренняя рамка */
  .inner-border {
    position: absolute; inset: 7px; border-radius: 13px;
    border: 1px solid rgba(212,165,55,0.12); pointer-events: none;
  }

  /* Surface lighting */
  .surface-light {
    position: absolute; top:0; left:0; right:0; height:50%; border-radius: 18px 18px 0 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.07), transparent);
    pointer-events: none;
  }

  /* Shimmer */
  .shimmer-overlay {
    position: absolute; inset: 0; pointer-events: none; z-index: 10; overflow: hidden;
  }
  .shimmer-sweep {
    position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 35%, rgba(255,215,0,0.15) 50%, transparent 65%);
    animation: sweep 5s ease-in-out infinite;
  }
  @keyframes sweep {
    0%,100% { transform: translateX(-150%) skewX(-20deg); }
    20%,80% { transform: translateX(-150%) skewX(-20deg); }
    50%      { transform: translateX(200%) skewX(-20deg); }
  }

  /* ── Портрет ── */
  .portrait-wrap {
    padding: 22px 22px 0;
    display: flex;
    justify-content: center;
    position: relative;
  }
  .portrait-aura {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 220px; height: 220px; border-radius: 50%;
    background: radial-gradient(circle, rgba(212,165,55,0.18) 0%, transparent 70%);
    animation: pulseGlow 3s ease-in-out infinite;
  }
  @keyframes pulseGlow {
    0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(0.95); }
    50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.05); }
  }

  .portrait-frame {
    position: relative; width: 164px; height: 164px; border-radius: 14px;
    border: 2px solid var(--gold);
    background: linear-gradient(135deg, var(--bg-abyss), var(--bg-tertiary));
    overflow: hidden;
    box-shadow: 0 0 24px rgba(212,165,55,0.4), inset 0 0 24px rgba(6,10,15,0.7);
  }
  .portrait-img {
    width: 100%; height: 100%; font-size: 90px; display: flex;
    align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 30%, var(--bg-tertiary), var(--bg-abyss));
  }
  .portrait-vignette {
    position: absolute; bottom:0; left:0; right:0; height:56px;
    background: linear-gradient(to top, rgba(6,10,15,0.85), transparent);
  }

  /* Уровень */
  .level-badge {
    position: absolute; top: 18px; right: calc(50% - 97px);
    width: 30px; height: 30px; border-radius: 50%;
    background: radial-gradient(circle, var(--gold-bright), var(--gold-dim));
    border: 2px solid var(--bg-abyss);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700; color: var(--bg-abyss);
    animation: levelPulse 2.5s ease-in-out infinite;
    z-index: 5;
  }
  @keyframes levelPulse {
    0%,100% { box-shadow: 0 0 8px rgba(255,215,0,0.5); }
    50%      { box-shadow: 0 0 20px rgba(255,215,0,0.9), 0 0 40px rgba(255,215,0,0.3); }
  }

  /* ── Класс + раса ── */
  .hero-meta {
    padding: 16px 22px 0;
    text-align: center;
  }
  .hero-class-row {
    display: flex; justify-content: center; align-items: center; gap: 10px;
  }
  .hero-class-row .icon { font-size: 14px; }
  .hero-class-row .race {
    font-family: 'Oswald', sans-serif; font-size: 19px;
    color: var(--text); letter-spacing: 1px;
  }
  .hero-class-row .cls {
    font-family: 'Oswald', sans-serif; font-size: 19px;
    color: var(--gold); letter-spacing: 1px;
  }
  .hero-gender {
    margin-top: 4px; font-size: 12px; color: var(--text-sec);
    letter-spacing: 3px; text-transform: uppercase;
  }

  /* ── Разделитель ── */
  .divider {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 22px;
  }
  .divider-line {
    flex: 1; height: 1px;
  }
  .divider-line.left  { background: linear-gradient(to right, transparent, var(--gold-dim)); }
  .divider-line.right { background: linear-gradient(to left,  transparent, var(--gold-dim)); }
  .divider-motif { color: var(--gold); font-size: 9px; letter-spacing: 4px; opacity: 0.85; }

  /* ── Подпись класса ── */
  .class-label {
    text-align: center; margin-bottom: 14px;
    font-family: 'Oswald', sans-serif; font-size: 13px;
    color: var(--gold); opacity: 0.75; letter-spacing: 4px; text-transform: uppercase;
  }

  /* ── Статы ── */
  .stats { padding: 0 22px 20px; display: flex; flex-direction: column; gap: 10px; }
  .stat-row { display: flex; flex-direction: column; gap: 4px; }
  .stat-header { display: flex; justify-content: space-between; align-items: center; }
  .stat-left { display: flex; align-items: center; gap: 6px; }
  .stat-icon { font-size: 13px; }
  .stat-name {
    font-family: 'Oswald', sans-serif; font-size: 12px;
    color: var(--text-sec); letter-spacing: 1.5px;
  }
  .stat-bonus { font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 700; }

  .stat-track {
    height: 4px; border-radius: 2px;
    background: rgba(46,61,82,0.6);
    overflow: hidden; position: relative;
  }
  .stat-base {
    position: absolute; left:0; top:0; bottom:0;
    border-radius: 2px; transition: width 0.9s cubic-bezier(0.34,1.56,0.64,1);
  }
  .stat-bonus-bar {
    position: absolute; top:0; bottom:0;
    border-radius: 0 2px 2px 0;
    transition: width 0.9s cubic-bezier(0.34,1.56,0.64,1);
  }
  .stat-shine {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.2), transparent);
    border-radius: 2px; pointer-events: none;
  }

  /* ── Нижняя полоса ── */
  .card-footer {
    border-top: 1px solid rgba(212,165,55,0.12);
    padding: 10px 22px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-label { font-size: 10px; color: var(--text-sec); letter-spacing: 1.5px; text-transform: uppercase; }
  .dot-row { display: flex; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ── Инпут имени ── */
  .name-section { margin-top: 24px; width: 320px; animation: slideUp 0.5s ease 0.4s both; }
  .name-label { font-size: 11px; color: var(--text-sec); letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 8px; }
  @keyframes slideUp { from { opacity:0; transform: translateY(14px); } to { opacity:1; transform:none; } }

  .name-row { display: flex; gap: 8px; }
  .name-input-wrap {
    flex: 1; border-radius: 10px;
    border: 1.5px solid var(--border);
    background: rgba(20,27,38,0.85);
    padding: 0 14px;
    display: flex; align-items: center;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .name-input-wrap.focused {
    border-color: rgba(212,165,55,0.6);
    box-shadow: 0 0 14px rgba(212,165,55,0.18);
  }
  .name-input-wrap input {
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px;
    flex: 1; padding: 14px 0;
  }
  .name-input-wrap input::placeholder { color: rgba(168,152,128,0.5); }
  .char-count { font-size: 11px; color: var(--text-sec); white-space: nowrap; }

  .rand-btn {
    width: 52px; height: 52px; border-radius: 10px;
    border: 1.5px solid rgba(212,165,55,0.4);
    background: radial-gradient(circle, var(--bg-tertiary), var(--bg-secondary));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; cursor: pointer;
    box-shadow: 0 0 10px rgba(212,165,55,0.15);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .rand-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 18px rgba(212,165,55,0.35);
  }
  .rand-btn:active { transform: scale(0.95); }

  /* ── CTA ── */
  .cta-wrap { margin-top: 14px; width: 320px; animation: slideUp 0.5s ease 0.6s both; }
  .cta-btn {
    width: 100%; padding: 16px; border-radius: 12px;
    border: 1.5px solid var(--gold);
    background: linear-gradient(135deg, rgba(139,105,20,0.9), rgba(212,165,55,0.9), rgba(255,215,0,0.7));
    color: var(--bg-abyss); font-family: 'Oswald', sans-serif;
    font-size: 18px; letter-spacing: 5px; font-weight: 700; cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,165,55,0.35);
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .cta-btn::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.18), transparent 50%);
    pointer-events: none;
  }
  .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(212,165,55,0.55); }
  .cta-btn:active { transform: translateY(1px); }
</style>
</head>
<body>

<!-- Частицы-эмберы -->
<div class="particles" id="particles"></div>

<div class="page">

  <!-- Заголовок -->
  <div class="page-title">
    <div class="sub">CHARACTER CREATION</div>
    <div class="main">CHOOSE YOUR HERO</div>
  </div>

  <!-- Карточка -->
  <div class="card" id="heroCard">

    <!-- Угловые скобки -->
    <div class="corner corner-tl">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M0,18 L0,0 L18,0" stroke="rgba(212,165,55,0.7)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="corner corner-tr">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M0,18 L0,0 L18,0" stroke="rgba(212,165,55,0.7)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="corner corner-br">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M0,18 L0,0 L18,0" stroke="rgba(212,165,55,0.7)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="corner corner-bl">
      <svg viewBox="0 0 20 20" fill="none">
        <path d="M0,18 L0,0 L18,0" stroke="rgba(212,165,55,0.7)" stroke-width="1.5"/>
      </svg>
    </div>

    <!-- Угловые ромбы -->
    <div class="cdiamond tl"></div>
    <div class="cdiamond tr"></div>
    <div class="cdiamond bl"></div>
    <div class="cdiamond br"></div>

    <!-- Внутренняя рамка -->
    <div class="inner-border"></div>

    <!-- Поверхностный свет -->
    <div class="surface-light"></div>

    <!-- Shimmer -->
    <div class="shimmer-overlay">
      <div class="shimmer-sweep"></div>
    </div>

    <!-- Портрет -->
    <div class="portrait-wrap">
      <div class="portrait-aura"></div>
      <div class="portrait-frame">
        <div class="portrait-img">🐺</div>
        <div class="portrait-vignette"></div>
      </div>
      <div class="level-badge">1</div>
    </div>

    <!-- Раса / Класс -->
    <div class="hero-meta">
      <div class="hero-class-row">
        <span class="icon">⚙️</span>
        <span class="race">Dogfolk</span>
        <span class="icon">⚔️</span>
        <span class="cls">Warrior</span>
      </div>
      <div class="hero-gender">Male</div>
    </div>

    <!-- Разделитель -->
    <div class="divider">
      <div class="divider-line left"></div>
      <span class="divider-motif">◆◇◆</span>
      <div class="divider-line right"></div>
    </div>

    <!-- Подпись -->
    <div class="class-label">Male Dogfolk Warrior</div>

    <!-- Статы -->
    <div class="stats">
      <div class="stat-row">
        <div class="stat-header">
          <div class="stat-left">
            <span class="stat-icon">💪</span>
            <span class="stat-name">STRENGTH</span>
          </div>
          <span class="stat-bonus" style="color:var(--str)">+3</span>
        </div>
        <div class="stat-track">
          <div class="stat-base"  id="str-base"  style="width:0%; background:var(--gold-dim)"></div>
          <div class="stat-bonus-bar" id="str-bonus" style="width:0%; left:40%; background:var(--str); box-shadow:0 0 6px var(--str)"></div>
          <div class="stat-shine"></div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-header">
          <div class="stat-left">
            <span class="stat-icon">🪶</span>
            <span class="stat-name">AGILITY</span>
          </div>
          <span class="stat-bonus" style="color:var(--agi)">+2</span>
        </div>
        <div class="stat-track">
          <div class="stat-base"  id="agi-base"  style="width:0%; background:var(--gold-dim)"></div>
          <div class="stat-bonus-bar" id="agi-bonus" style="width:0%; left:40%; background:var(--agi); box-shadow:0 0 6px var(--agi)"></div>
          <div class="stat-shine"></div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-header">
          <div class="stat-left">
            <span class="stat-icon">❤️</span>
            <span class="stat-name">VITALITY</span>
          </div>
          <span class="stat-bonus" style="color:var(--vit)">+2</span>
        </div>
        <div class="stat-track">
          <div class="stat-base"  id="vit-base"  style="width:0%; background:var(--gold-dim)"></div>
          <div class="stat-bonus-bar" id="vit-bonus" style="width:0%; left:40%; background:var(--vit); box-shadow:0 0 6px var(--vit)"></div>
          <div class="stat-shine"></div>
        </div>
      </div>

      <div class="stat-row">
        <div class="stat-header">
          <div class="stat-left">
            <span class="stat-icon">📖</span>
            <span class="stat-name">WISDOM</span>
          </div>
          <span class="stat-bonus" style="color:var(--wis)">+1</span>
        </div>
        <div class="stat-track">
          <div class="stat-base"  id="wis-base"  style="width:0%; background:var(--gold-dim)"></div>
          <div class="stat-bonus-bar" id="wis-bonus" style="width:0%; left:40%; background:var(--wis); box-shadow:0 0 6px var(--wis)"></div>
          <div class="stat-shine"></div>
        </div>
      </div>
    </div>

    <!-- Нижняя полоска -->
    <div class="card-footer">
      <span class="footer-label">Class Bonus</span>
      <div class="dot-row">
        <div class="dot" style="background:var(--str); box-shadow: 0 0 4px var(--str)"></div>
        <div class="dot" style="background:var(--str); box-shadow: 0 0 4px var(--str)"></div>
        <div class="dot" style="background:var(--agi); box-shadow: 0 0 4px var(--agi)"></div>
        <div class="dot" style="background:var(--vit); box-shadow: 0 0 4px var(--vit)"></div>
        <div class="dot" style="background:var(--wis); box-shadow: 0 0 4px var(--wis)"></div>
      </div>
    </div>
  </div>

  <!-- Имя -->
  <div class="name-section">
    <div class="name-label">Your Name</div>
    <div class="name-row">
      <div class="name-input-wrap" id="inputWrap">
        <input type="text" id="nameInput" placeholder="Enter hero name..." maxlength="16" />
        <span class="char-count" id="charCount">0/16</span>
      </div>
      <div class="rand-btn" id="randBtn" title="Random name">🎲</div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <button class="cta-btn" id="ctaBtn">BEGIN JOURNEY</button>
  </div>

</div>

<script>
// ── Частицы ──────────────────────────────────────────────────────────────────
const particleContainer = document.getElementById('particles');
for (let i = 0; i < 22; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 3 + 1;
  const dur  = Math.random() * 8 + 5;
  const x    = Math.random() * 100;
  const drift= (Math.random() - 0.5) * 80;
  const delay= Math.random() * dur * -1;
  const alpha= Math.random() * 0.5 + 0.2;
  const color= size > 3 ? '#FFD700' : '#8B6914';
  p.style.cssText = `
    left: ${x}%; bottom: -10px; width: ${size}px; height: ${size}px;
    background: ${color};
    --drift: ${drift}px;
    animation-duration: ${dur}s;
    animation-delay: ${delay}s;
    opacity: ${alpha};
    ${size > 2.5 ? `box-shadow: 0 0 ${size*3}px ${color}` : ''}
  `;
  particleContainer.appendChild(p);
}

// ── Анимация баров ───────────────────────────────────────────────────────────
const baseW  = 40; // 40% базовый
const bonuses= { str:3, agi:2, vit:2, wis:1 };

function animateBars() {
  Object.entries(bonuses).forEach(([key, bonus], i) => {
    const bonusW = bonus * 8;
    setTimeout(() => {
      document.getElementById(`${key}-base`).style.width  = `${baseW}%`;
    }, 300 + i * 120);
    setTimeout(() => {
      document.getElementById(`${key}-bonus`).style.width = `${bonusW}%`;
    }, 500 + i * 120);
  });
}
setTimeout(animateBars, 400);

// ── 3D Tilt на десктопе ──────────────────────────────────────────────────────
const card = document.getElementById('heroCard');
card.addEventListener('mousemove', e => {
  const r  = card.getBoundingClientRect();
  const cx = r.left + r.width  / 2;
  const cy = r.top  + r.height / 2;
  const dx = (e.clientX - cx) / (r.width  / 2);
  const dy = (e.clientY - cy) / (r.height / 2);
  card.style.transform = `perspective(900px) rotateX(${dy * -7}deg) rotateY(${dx * 7}deg)`;
  card.style.animation = 'none'; // останавливаем float при наведении
});
card.addEventListener('mouseleave', () => {
  card.style.transform = '';
  card.style.animation = 'floatAnim 4s ease-in-out infinite';
});

// ── Инпут имени ──────────────────────────────────────────────────────────────
const nameInput  = document.getElementById('nameInput');
const charCount  = document.getElementById('charCount');
const inputWrap  = document.getElementById('inputWrap');

nameInput.addEventListener('focus',  () => inputWrap.classList.add('focused'));
nameInput.addEventListener('blur',   () => inputWrap.classList.remove('focused'));
nameInput.addEventListener('input',  () => {
  charCount.textContent = `${nameInput.value.length}/16`;
});

// ── Случайное имя ────────────────────────────────────────────────────────────
const NAMES = [
  "Gnarltooth","Ragefang","Ironpaw","Duskbite","Ashclaw",
  "Mooncrusher","Grimhowl","Stonefang","Bloodmaw","Veilsnarl",
];
document.getElementById('randBtn').addEventListener('click', () => {
  const n = NAMES[Math.floor(Math.random() * NAMES.length)];
  nameInput.value = n;
  charCount.textContent = `${n.length}/16`;
  inputWrap.classList.add('focused');
  setTimeout(() => inputWrap.classList.remove('focused'), 1500);
});

// ── CTA ──────────────────────────────────────────────────────────────────────
const ctaBtn = document.getElementById('ctaBtn');
ctaBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) {
    nameInput.focus();
    inputWrap.classList.add('focused');
    inputWrap.style.borderColor = 'rgba(192,57,43,0.7)';
    inputWrap.style.boxShadow   = '0 0 14px rgba(192,57,43,0.25)';
    setTimeout(() => {
      inputWrap.style.borderColor = '';
      inputWrap.style.boxShadow   = '';
    }, 1500);
    return;
  }
  ctaBtn.textContent = '⚔ HERO CREATED! ⚔';
  ctaBtn.style.background = 'linear-gradient(135deg, rgba(20,60,20,0.9), rgba(46,204,113,0.7))';
  ctaBtn.style.borderColor = '#2ECC71';
  setTimeout(() => {
    ctaBtn.textContent = 'BEGIN JOURNEY';
    ctaBtn.style.background = '';
    ctaBtn.style.borderColor = '';
  }, 2000);
});
</script>
</body>
</html>
