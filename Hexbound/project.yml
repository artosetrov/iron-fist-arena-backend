name: Hexbound
options:
  bundleIdPrefix: com.hexbound
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  defaultConfig: Release

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Hexbound:
    type: application
    platform: iOS
    sources:
      - path: Hexbound
        excludes:
          - "**/*.md"
    resources:
      - path: Hexbound/Resources/Assets.xcassets
      - path: Hexbound/Resources/Fonts
    settings:
      base:
        INFOPLIST_FILE: Hexbound/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.hexbound.app
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
    info:
      path: Hexbound/Info.plist
