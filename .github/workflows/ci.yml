name: CI - Build Check

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'admin/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'admin/**'

jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx vitest run
      - run: npx next build

  admin-build:
    name: Admin Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx next build

  prisma-schema-sync:
    name: Prisma Schema Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check backend/admin schemas match
        run: diff backend/prisma/schema.prisma admin/prisma/schema.prisma || (echo "Prisma schemas out of sync!" && exit 1)
