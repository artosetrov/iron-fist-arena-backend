<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexbound Combat VFX v5 — One-Shot Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; }
h1 { text-align: center; color: #888; font-size: 1.4em; margin-bottom: 20px; letter-spacing: 2px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; }
.card { background: #111118; border: 1px solid #222; border-radius: 12px; overflow: hidden; position: relative; }
.card-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #1a1a25; }
.card-name { font-weight: 600; font-size: 0.95em; color: #ddd; }
.card-tag { font-size: 0.7em; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
.tag-phys { background: #3d2e0f; color: #FFD700; }
.tag-magic { background: #1a1040; color: #8B5CF6; }
.tag-poison { background: #0f3d1a; color: #2ECC71; }
.tag-true { background: #3d3d0f; color: #FFD700; }
.tag-util { background: #1a2a3d; color: #78B4FF; }
.tag-heal { background: #0f3d2e; color: #2ECC71; }
.card-svg { width: 100%; aspect-ratio: 1; background: #000; display: block; cursor: pointer; }
.replay-hint { text-align: center; font-size: 0.65em; color: #555; padding: 4px; }
</style>
</head>
<body>
<h1>HEXBOUND — COMBAT VFX v5 (ONE-SHOT)</h1>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;

// ============ ONE-SHOT WRAPPER ============
// Each VFX plays once then fades out. Click to replay.
function VFXCard({ name, tag, tagClass, children, dur = 1.0 }) {
  const [key, setKey] = useState(0);
  const replay = () => setKey(k => k + 1);

  return (
    <div className="card">
      <div className="card-header">
        <span className="card-name">{name}</span>
        <span className={`card-tag ${tagClass}`}>{tag}</span>
      </div>
      <svg key={key} className="card-svg" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" onClick={replay}>
        <rect width="512" height="512" fill="#000"/>
        <g opacity="0">
          {/* Master fade: appear fast, hold, then fade out */}
          <animate attributeName="opacity" values="0;1;1;0" keyTimes={`0;0.1;0.6;1`} dur={`${dur}s`} fill="freeze" repeatCount="1"/>
          {children}
        </g>
      </svg>
      <div className="replay-hint">click to replay</div>
    </div>
  );
}

// ============ SHARED FILTERS ============
function Filters({ id }) {
  return (
    <defs>
      <filter id={`${id}-gs`}><feGaussianBlur stdDeviation="12" result="b1"/><feGaussianBlur stdDeviation="5" result="b2"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${id}-gm`}><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${id}-gl`}><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${id}-go`}><feGaussianBlur stdDeviation="8"/></filter>
      <filter id={`${id}-sp`}><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
  );
}

// ============ CORE GLOW ============
function Core({ colors, R = 55, id }) {
  const [c1, c2, c3, c4] = colors;
  return (
    <g>
      <defs>
        <radialGradient id={`${id}-cg`} cx="50%" cy="50%" r="45%">
          <stop offset="0%" stopColor="#FFF"/>
          <stop offset="10%" stopColor={c4}/>
          <stop offset="25%" stopColor={c1}/>
          <stop offset="50%" stopColor={c2}/>
          <stop offset="75%" stopColor={c3} stopOpacity="0.4"/>
          <stop offset="100%" stopColor={c3} stopOpacity="0"/>
        </radialGradient>
      </defs>
      {/* Ambient halo */}
      <circle cx="256" cy="256" r={R * 1.8} fill={c3} opacity="0.06" filter={`url(#${id}-go)`}/>
      {/* Core glow - scale up from 0 */}
      <circle cx="256" cy="256" r="0" fill={`url(#${id}-cg)`} filter={`url(#${id}-gs)`}>
        <animate attributeName="r" values={`0;${R * 1.15};${R}`} keyTimes="0;0.3;1" dur="0.6s" fill="freeze"/>
      </circle>
      {/* Inner layers - pop in */}
      <circle cx="256" cy="256" r="0" fill={c1} opacity="0.75" filter={`url(#${id}-gm)`}>
        <animate attributeName="r" values={`0;${R * 0.55};${R * 0.5}`} keyTimes="0;0.25;1" dur="0.5s" fill="freeze"/>
      </circle>
      <circle cx="256" cy="256" r="0" fill={c4} opacity="0.92">
        <animate attributeName="r" values={`0;${R * 0.3};${R * 0.25}`} keyTimes="0;0.2;1" dur="0.4s" fill="freeze"/>
      </circle>
      <circle cx="256" cy="256" r="0" fill="#FFF">
        <animate attributeName="r" values={`0;${R * 0.18};${R * 0.12}`} keyTimes="0;0.15;1" dur="0.35s" fill="freeze"/>
      </circle>
    </g>
  );
}

// ============ EXPLODING PARTICLES ============
function ExplodeParticles({ count, color, minR, maxR, spread, dur = 0.8 }) {
  const pts = useRef(Array.from({ length: count }, (_, i) => ({
    angle: (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6,
    r: minR + Math.random() * (maxR - minR),
    dist: spread * (0.5 + Math.random() * 0.5),
    startDist: 15 + Math.random() * 25,
    delay: Math.random() * dur * 0.2,
    spd: dur * (0.6 + Math.random() * 0.4),
  }))).current;

  return (
    <g>
      {pts.map((p, i) => {
        const sx = 256 + Math.cos(p.angle) * p.startDist;
        const sy = 256 + Math.sin(p.angle) * p.startDist;
        const ex = 256 + Math.cos(p.angle) * p.dist;
        const ey = 256 + Math.sin(p.angle) * p.dist;
        return (
          <circle key={i} cx={sx} cy={sy} r={p.r} fill={color} opacity="0">
            <animate attributeName="cx" from={sx} to={ex} dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
            <animate attributeName="cy" from={sy} to={ey} dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
            <animate attributeName="opacity" values="0;0.95;0.7;0" keyTimes="0;0.15;0.55;1" dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
            <animate attributeName="r" from={p.r} to={p.r * 0.2} dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
          </circle>
        );
      })}
    </g>
  );
}

// ============ EXPANDING SHOCKWAVE RINGS ============
function Shockwave({ count, color, maxR, dur = 0.8, strokeW = 1.5 }) {
  return (
    <g>
      {Array.from({ length: count }, (_, i) => (
        <circle key={i} cx="256" cy="256" r="20" fill="none" stroke={color} strokeWidth={strokeW} opacity="0">
          <animate attributeName="r" from="20" to={maxR} dur={`${dur}s`} begin={`${i * dur * 0.3}s`} fill="freeze"/>
          <animate attributeName="opacity" values="0;0.7;0.3;0" keyTimes="0;0.15;0.5;1" dur={`${dur}s`} begin={`${i * dur * 0.3}s`} fill="freeze"/>
          <animate attributeName="stroke-width" from={strokeW} to="0.3" dur={`${dur}s`} begin={`${i * dur * 0.3}s`} fill="freeze"/>
        </circle>
      ))}
    </g>
  );
}

// ============ ENERGY RAYS (burst outward) ============
function Rays({ count, color1, color2, maxLen, minLen, maxW = 4, minW = 1.5, dur = 0.6, filter }) {
  const rays = useRef(Array.from({ length: count }, (_, i) => {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
    const len = minLen + Math.random() * (maxLen - minLen);
    const w = minW + Math.random() * (maxW - minW);
    return { angle, len, w, color: Math.random() > 0.5 ? color1 : color2, op: 0.5 + Math.random() * 0.4 };
  })).current;

  return (
    <g filter={filter}>
      {rays.map((r, i) => {
        const ex = 256 + Math.cos(r.angle) * r.len;
        const ey = 256 + Math.sin(r.angle) * r.len;
        const midX = 256 + Math.cos(r.angle) * 20;
        const midY = 256 + Math.sin(r.angle) * 20;
        return (
          <line key={i} x1="256" y1="256" x2={midX} y2={midY} stroke={r.color} strokeWidth={r.w} strokeLinecap="round" opacity="0">
            <animate attributeName="x2" from={midX} to={ex} dur={`${dur}s`} fill="freeze"/>
            <animate attributeName="y2" from={midY} to={ey} dur={`${dur}s`} fill="freeze"/>
            <animate attributeName="opacity" values={`0;${r.op};${r.op * 0.6};0`} keyTimes="0;0.2;0.6;1" dur={`${dur * 1.3}s`} fill="freeze"/>
          </line>
        );
      })}
    </g>
  );
}

// ============ DEBRIS FRAGMENTS (fly outward) ============
function Debris({ count, color1, color2, spread, dur = 0.7, filter }) {
  const frags = useRef(Array.from({ length: count }, (_, i) => {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
    const dist = spread * (0.5 + Math.random() * 0.5);
    const size = 4 + Math.random() * 10;
    const rot = Math.random() * 360;
    return { angle, dist, size, rot, color: Math.random() > 0.5 ? color1 : color2, startDist: 20 + Math.random() * 20 };
  })).current;

  return (
    <g filter={filter}>
      {frags.map((f, i) => {
        const sx = 256 + Math.cos(f.angle) * f.startDist;
        const sy = 256 + Math.sin(f.angle) * f.startDist;
        const ex = 256 + Math.cos(f.angle) * f.dist;
        const ey = 256 + Math.sin(f.angle) * f.dist;
        const delay = Math.random() * 0.1;
        return (
          <g key={i} opacity="0">
            <animate attributeName="opacity" values="0;0.8;0.5;0" keyTimes="0;0.15;0.5;1" dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
            <polygon
              points={`${sx},${sy - f.size / 2} ${sx + f.size / 3},${sy + f.size / 3} ${sx - f.size / 3},${sy + f.size / 4}`}
              fill={f.color} transform={`rotate(${f.rot} ${sx} ${sy})`}
            >
              <animateTransform attributeName="transform" type="translate" from="0,0" to={`${ex - sx},${ey - sy}`} dur={`${dur}s`} begin={`${delay}s`} fill="freeze" additive="sum"/>
              <animateTransform attributeName="transform" type="rotate" from={`${f.rot} ${sx} ${sy}`} to={`${f.rot + 180} ${sx} ${sy}`} dur={`${dur}s`} begin={`${delay}s`} fill="freeze" additive="sum"/>
            </polygon>
          </g>
        );
      })}
    </g>
  );
}

// ============ RISING PARTICLES (heal) ============
function RiseParticles({ count, colors, spread, dur = 1.2 }) {
  const pts = useRef(Array.from({ length: count }, (_, i) => ({
    x: 256 + (Math.random() - 0.5) * spread,
    r: 2 + Math.random() * 5,
    delay: Math.random() * dur * 0.5,
    spd: dur * (0.5 + Math.random() * 0.5),
    color: colors[Math.floor(Math.random() * colors.length)],
    drift: (Math.random() - 0.5) * 30,
  }))).current;

  return (
    <g>
      {pts.map((p, i) => (
        <circle key={i} cx={p.x} cy="400" r={p.r} fill={p.color} opacity="0">
          <animate attributeName="cy" from="400" to="80" dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
          <animate attributeName="cx" from={p.x} to={p.x + p.drift} dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
          <animate attributeName="opacity" values="0;0.85;0.6;0" keyTimes="0;0.15;0.6;1" dur={`${p.spd}s`} begin={`${p.delay}s`} fill="freeze"/>
        </circle>
      ))}
    </g>
  );
}

// ============ CRACK LINES (radiate from center) ============
function Cracks({ count, color, maxLen, dur = 0.5 }) {
  const lines = useRef(Array.from({ length: count }, (_, i) => {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.35;
    const len = maxLen * (0.5 + Math.random() * 0.5);
    return { angle, len };
  })).current;

  return (
    <g stroke={color} strokeWidth="1.5" fill="none" opacity="0" strokeLinecap="round">
      <animate attributeName="opacity" values="0;0.5;0.3;0" keyTimes="0;0.2;0.6;1" dur={`${dur}s`} fill="freeze"/>
      {lines.map((l, i) => {
        const x1 = 256 + Math.cos(l.angle) * 40;
        const y1 = 256 + Math.sin(l.angle) * 40;
        const x2 = 256 + Math.cos(l.angle) * l.len;
        const y2 = 256 + Math.sin(l.angle) * l.len;
        return <line key={i} x1={x1} y1={y1} x2={x1} y2={y1}>
          <animate attributeName="x2" from={x1} to={x2} dur={`${dur}s`} fill="freeze"/>
          <animate attributeName="y2" from={y1} to={y2} dur={`${dur}s`} fill="freeze"/>
        </line>;
      })}
    </g>
  );
}

// ============ IMPACT FLASH (white screen flash) ============
function ImpactFlash({ color = "#FFF", dur = 0.3, delay = 0, maxOp = 0.6 }) {
  return (
    <rect x="0" y="0" width="512" height="512" fill={color} opacity="0">
      <animate attributeName="opacity" values={`0;${maxOp};0`} keyTimes="0;0.15;1" dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
    </rect>
  );
}

// ============ SMOKE CLOUDS (lingering after explosion) ============
function SmokeClouds({ count, color, spread, dur = 1.0, delay = 0.2 }) {
  const clouds = useRef(Array.from({ length: count }, (_, i) => ({
    angle: (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.6,
    dist: spread * (0.3 + Math.random() * 0.5),
    r: 15 + Math.random() * 25,
    drift: (Math.random() - 0.5) * 30,
    driftY: -10 - Math.random() * 20,
  }))).current;

  return (
    <g>
      {clouds.map((c, i) => {
        const x = 256 + Math.cos(c.angle) * c.dist;
        const y = 256 + Math.sin(c.angle) * c.dist;
        return (
          <circle key={i} cx={x} cy={y} r="0" fill={color} opacity="0">
            <animate attributeName="r" values={`0;${c.r};${c.r * 1.3}`} keyTimes="0;0.3;1" dur={`${dur}s`} begin={`${delay + i * 0.05}s`} fill="freeze"/>
            <animate attributeName="opacity" values="0;0.2;0.08;0" keyTimes="0;0.2;0.6;1" dur={`${dur}s`} begin={`${delay + i * 0.05}s`} fill="freeze"/>
            <animate attributeName="cx" from={x} to={x + c.drift} dur={`${dur}s`} begin={`${delay + i * 0.05}s`} fill="freeze"/>
            <animate attributeName="cy" from={y} to={y + c.driftY} dur={`${dur}s`} begin={`${delay + i * 0.05}s`} fill="freeze"/>
          </circle>
        );
      })}
    </g>
  );
}

// ============ EMBER TRAILS (hot particles with tails) ============
function EmberTrails({ count, color, tailColor, spread, dur = 0.8 }) {
  const embers = useRef(Array.from({ length: count }, (_, i) => {
    const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.7;
    const dist = spread * (0.4 + Math.random() * 0.6);
    const startDist = 20 + Math.random() * 15;
    return { angle, dist, startDist, delay: Math.random() * 0.15, spd: dur * (0.6 + Math.random() * 0.4) };
  })).current;

  return (
    <g>
      {embers.map((e, i) => {
        const sx = 256 + Math.cos(e.angle) * e.startDist;
        const sy = 256 + Math.sin(e.angle) * e.startDist;
        const ex = 256 + Math.cos(e.angle) * e.dist;
        const ey = 256 + Math.sin(e.angle) * e.dist;
        const mx = 256 + Math.cos(e.angle) * (e.dist * 0.6);
        const my = 256 + Math.sin(e.angle) * (e.dist * 0.6);
        return (
          <g key={i} opacity="0">
            <animate attributeName="opacity" values="0;0.8;0.5;0" keyTimes="0;0.1;0.5;1" dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
            {/* Tail line */}
            <line x1={sx} y1={sy} x2={sx} y2={sy} stroke={tailColor} strokeWidth="1.5" strokeLinecap="round" opacity="0.5">
              <animate attributeName="x1" from={sx} to={mx} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
              <animate attributeName="y1" from={sy} to={my} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
              <animate attributeName="x2" from={sx} to={ex} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
              <animate attributeName="y2" from={sy} to={ey} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
            </line>
            {/* Head dot */}
            <circle cx={sx} cy={sy} r="2.5" fill={color}>
              <animate attributeName="cx" from={sx} to={ex} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
              <animate attributeName="cy" from={sy} to={ey} dur={`${e.spd}s`} begin={`${e.delay}s`} fill="freeze"/>
            </circle>
          </g>
        );
      })}
    </g>
  );
}

// ============ DISTORTION RING (heat haze) ============
function DistortionRing({ color, maxR = 120, dur = 0.6, delay = 0 }) {
  return (
    <circle cx="256" cy="256" r="30" fill="none" stroke={color} strokeWidth="8" opacity="0" strokeDasharray="4 8">
      <animate attributeName="r" from="30" to={maxR} dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
      <animate attributeName="opacity" values="0;0.15;0.05;0" keyTimes="0;0.2;0.6;1" dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
      <animate attributeName="stroke-width" from="8" to="1" dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
    </circle>
  );
}

// ============ GROUND DUST (horizontal dust at base) ============
function GroundDust({ color, spread = 160, dur = 0.7, delay = 0.1, y = 340 }) {
  const dust = useRef(Array.from({ length: 8 }, (_, i) => ({
    x: 256 + (Math.random() - 0.5) * spread,
    r: 10 + Math.random() * 15,
    dir: Math.random() > 0.5 ? 1 : -1,
    drift: 15 + Math.random() * 25,
  }))).current;

  return (
    <g>
      {dust.map((d, i) => (
        <ellipse key={i} cx={d.x} cy={y} rx="0" ry="0" fill={color} opacity="0">
          <animate attributeName="rx" values={`0;${d.r};${d.r * 1.2}`} keyTimes="0;0.3;1" dur={`${dur}s`} begin={`${delay + i * 0.04}s`} fill="freeze"/>
          <animate attributeName="ry" values={`0;${d.r * 0.4};${d.r * 0.5}`} keyTimes="0;0.3;1" dur={`${dur}s`} begin={`${delay + i * 0.04}s`} fill="freeze"/>
          <animate attributeName="opacity" values="0;0.2;0.06;0" keyTimes="0;0.2;0.6;1" dur={`${dur}s`} begin={`${delay + i * 0.04}s`} fill="freeze"/>
          <animate attributeName="cx" from={d.x} to={d.x + d.dir * d.drift} dur={`${dur}s`} begin={`${delay + i * 0.04}s`} fill="freeze"/>
        </ellipse>
      ))}
    </g>
  );
}

// ============ SECONDARY BURST (delayed second wave) ============
function SecondaryBurst({ count, color, spread, dur = 0.5, delay = 0.25 }) {
  const pts = useRef(Array.from({ length: count }, (_, i) => ({
    angle: (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5,
    dist: spread * (0.6 + Math.random() * 0.4),
    r: 1.5 + Math.random() * 3,
  }))).current;

  return (
    <g>
      {pts.map((p, i) => {
        const ex = 256 + Math.cos(p.angle) * p.dist;
        const ey = 256 + Math.sin(p.angle) * p.dist;
        return (
          <circle key={i} cx="256" cy="256" r={p.r} fill={color} opacity="0">
            <animate attributeName="cx" from="256" to={ex} dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
            <animate attributeName="cy" from="256" to={ey} dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
            <animate attributeName="opacity" values="0;0.7;0.3;0" keyTimes="0;0.15;0.55;1" dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
            <animate attributeName="r" from={p.r} to={p.r * 0.3} dur={`${dur}s`} begin={`${delay}s`} fill="freeze"/>
          </circle>
        );
      })}
    </g>
  );
}

// ============ SLASH ARC ============
function SlashArc({ color, startAngle = -60, sweep = 120, R = 140, dur = 0.3, strokeW = 5, delay = 0 }) {
  const a1 = startAngle * Math.PI / 180;
  const a2 = (startAngle + sweep) * Math.PI / 180;
  const x1 = 256 + Math.cos(a1) * R, y1 = 256 + Math.sin(a1) * R;
  const x2 = 256 + Math.cos(a2) * R, y2 = 256 + Math.sin(a2) * R;
  const largeArc = sweep > 180 ? 1 : 0;
  const pathLen = R * sweep * Math.PI / 180;

  return (
    <path d={`M${x1},${y1} A${R},${R} 0 ${largeArc} 1 ${x2},${y2}`}
      fill="none" stroke={color} strokeWidth={strokeW} strokeLinecap="round"

        <animate attributeName="opacity" values="0;0.6;0.35;0" keyTimes="0;0.15;0.5;1" dur="0.9s" fill="freeze"/>
        <path d="M256,170 L310,200 L310,280 Q310,320 256,345 Q202,320 202,280 L202,200 Z"
          fill="#4169E1" opacity="0.1" filter="url(#bd-gm)"/>
        <path d="M256,170 L310,200 L310,280 Q310,320 256,345 Q202,320 202,280 L202,200 Z"
          fill="none" stroke="#78B4FF" strokeWidth="2.5" filter="url(#bd-gm)"/>
        <path d="M256,190 L300,215 L300,275 Q300,305 256,325 Q212,305 212,275 L212,215 Z"
          fill="none" stroke="#4169E1" strokeWidth="1" strokeDasharray="8 6"/>
      </g>
      <RiseParticles count={14} colors={["#78B4FF","#4169E1","#FFF"]} spread={140} dur={1.0}/>
      <Shockwave count={2} color="#78B4FF" maxR={130} dur={0.6}/>
    </VFXCard>
  );
}

function BuffSpeed() {
  return (
    <VFXCard name="Buff: Speed" tag="Buff" tagClass="tag-true" dur={1.0}>
      <Filters id="bs"/>
      {/* Yellow speed aura */}
      <circle cx="256" cy="256" r="0" fill="#FFD700" opacity="0" filter="url(#bs-go)">
        <animate attributeName="r" from="0" to="130" dur="0.6s" fill="freeze"/>
        <animate attributeName="opacity" values="0;0.06;0.02;0" keyTimes="0;0.2;0.6;1" dur="0.8s" fill="freeze"/>
      </circle>
      {/* Speed lines radiating from center */}
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.5;0.2;0" keyTimes="0;0.12;0.5;1" dur="0.7s" fill="freeze"/>
        {[180,200,220,240,260,280,300,320].map((y,i) => (
          <line key={i} x1={380} y1={y} x2={380} y2={y} stroke="#FFD700" strokeWidth={1+Math.random()} strokeLinecap="round" filter="url(#bs-gl)">
            <animate attributeName="x1" from={80+Math.random()*40} to="380" dur={`${0.25+Math.random()*0.1}s`} fill="freeze"/>
          </line>
        ))}
      </g>
      {/* Wind swirl */}
      <g opacity="0" stroke="#FFD700" fill="none" strokeWidth="1.5" strokeLinecap="round">
        <animate attributeName="opacity" values="0;0.3;0.1;0" keyTimes="0;0.15;0.5;1" dur="0.7s" fill="freeze"/>
        <path d="M200,220 Q230,200 260,220 Q290,240 260,260" strokeDasharray="8 6"/>
        <path d="M220,280 Q250,260 280,280 Q310,300 280,310" strokeDasharray="6 8"/>
      </g>
      <ExplodeParticles count={10} color="#FFD700" minR={1} maxR={3} spread={140} dur={0.5}/>
      <RiseParticles count={12} colors={["#FFD700","#FFF","#FFF8E1"]} spread={120} dur={0.8}/>
    </VFXCard>
  );
}

// =============================================
// CATEGORY 7: ZONE INDICATORS
// =============================================
function ZoneAttack({ zone }) {
  const yMap = { head: 150, chest: 256, legs: 360 };
  const y = yMap[zone] || 256;
  const label = zone.charAt(0).toUpperCase() + zone.slice(1);
  return (
    <VFXCard name={`Attack: ${label}`} tag="Zone" tagClass="tag-phys" dur={0.7}>
      <defs>
        <filter id="za-gm"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* Red targeting crosshair */}
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.8;0.5;0" keyTimes="0;0.1;0.5;1" dur="0.6s" fill="freeze"/>
        <circle cx="256" cy={y} r="0" fill="none" stroke="#E63946" strokeWidth="2" filter="url(#za-gm)">
          <animate attributeName="r" from="0" to="35" dur="0.25s" fill="freeze"/>
        </circle>
        <circle cx="256" cy={y} r="0" fill="none" stroke="#E63946" strokeWidth="1" strokeDasharray="4 4">
          <animate attributeName="r" from="0" to="50" dur="0.3s" fill="freeze"/>
        </circle>
        <line x1="236" y1={y} x2="276" y2={y} stroke="#E63946" strokeWidth="1.5"/>
        <line x1="256" y1={y-20} x2="256" y2={y+20} stroke="#E63946" strokeWidth="1.5"/>
      </g>
      {/* Impact flash */}
      <circle cx="256" cy={y} r="0" fill="#E63946" opacity="0" filter="url(#za-gm)">
        <animate attributeName="r" values="0;18;6;0" keyTimes="0;0.15;0.45;1" dur="0.4s" begin="0.15s" fill="freeze"/>
        <animate attributeName="opacity" values="0;0.6;0.2;0" keyTimes="0;0.1;0.45;1" dur="0.4s" begin="0.15s" fill="freeze"/>
      </circle>
    </VFXCard>
  );
}

function ZoneDefend({ zone }) {
  const yMap = { head: 150, chest: 256, legs: 360 };
  const y = yMap[zone] || 256;
  const label = zone.charAt(0).toUpperCase() + zone.slice(1);
  return (
    <VFXCard name={`Defend: ${label}`} tag="Zone" tagClass="tag-util" dur={0.8}>
      <defs>
        <filter id="zd-gm"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      {/* Blue shield marker */}
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.7;0.4;0" keyTimes="0;0.1;0.5;1" dur="0.7s" fill="freeze"/>
        <path d={`M256,${y-35} L285,${y-20} L285,${y+15} Q285,${y+35} 256,${y+45} Q227,${y+35} 227,${y+15} L227,${y-20} Z`}
          fill="#4169E1" opacity="0.15" filter="url(#zd-gm)"/>
        <path d={`M256,${y-35} L285,${y-20} L285,${y+15} Q285,${y+35} 256,${y+45} Q227,${y+35} 227,${y+15} L227,${y-20} Z`}
          fill="none" stroke="#78B4FF" strokeWidth="2" filter="url(#zd-gm)"/>
      </g>
      {/* Small glow */}
      <circle cx="256" cy={y} r="0" fill="#78B4FF" opacity="0" filter="url(#zd-gm)">
        <animate attributeName="r" values="0;15;8;0" keyTimes="0;0.2;0.5;1" dur="0.5s" fill="freeze"/>
        <animate attributeName="opacity" values="0;0.4;0.15;0" keyTimes="0;0.15;0.5;1" dur="0.5s" fill="freeze"/>
      </circle>
    </VFXCard>
  );
}

// =============================================
// CATEGORY 8: TEXT POPUPS
// =============================================
function PopupCrit() {
  return (
    <VFXCard name="CRITICAL!" tag="Popup" tagClass="tag-phys" dur={1.0}>
      <Filters id="ppc"/>
      <ImpactFlash color="#FFD700" dur={0.2} maxOp={0.3}/>
      {/* Text "CRIT!" */}
      <g opacity="0">
        <animate attributeName="opacity" values="0;1;0.8;0" keyTimes="0;0.1;0.5;1" dur="0.8s" fill="freeze"/>
        <animateTransform attributeName="transform" type="scale" values="0.5;1.15;1" keyTimes="0;0.15;1" dur="0.4s" fill="freeze" additive="sum"/>
        <text x="256" y="265" textAnchor="middle" fontFamily="Impact,sans-serif" fontSize="72" fontWeight="bold" fill="#FFD700" stroke="#3D2E0F" strokeWidth="3" filter="url(#ppc-gm)">CRIT!</text>
      </g>
      <ExplodeParticles count={12} color="#FFD700" minR={1.5} maxR={4} spread={180} dur={0.6}/>
      <EmberTrails count={6} color="#FFF" tailColor="#FFD700" spread={160} dur={0.5}/>
    </VFXCard>
  );
}

function PopupDodge() {
  return (
    <VFXCard name="DODGE!" tag="Popup" tagClass="tag-util" dur={0.8}>
      <Filters id="ppd"/>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.8;0.5;0" keyTimes="0;0.1;0.5;1" dur="0.7s" fill="freeze"/>
        <text x="256" y="260" textAnchor="middle" fontFamily="Impact,sans-serif" fontSize="60" fontWeight="bold" fill="#78B4FF" stroke="#1a2a3d" strokeWidth="2" filter="url(#ppd-gm)">DODGE</text>
      </g>
      {/* Speed lines behind text */}
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.3;0.1;0" keyTimes="0;0.12;0.5;1" dur="0.5s" fill="freeze"/>
        {[230,245,260,275].map((y,i) => (
          <line key={i} x1="350" y1={y} x2="350" y2={y} stroke="#78B4FF" strokeWidth="1" strokeLinecap="round">
            <animate attributeName="x1" from="140" to="350" dur="0.3s" fill="freeze"/>
          </line>
        ))}
      </g>
    </VFXCard>
  );
}

function PopupMiss() {
  return (
    <VFXCard name="MISS" tag="Popup" tagClass="tag-util" dur={0.7}>
      <Filters id="ppm"/>
      <g opacity="0">
        <animate attributeName="opacity" values="0;0.4;0.2;0" keyTimes="0;0.15;0.5;1" dur="0.6s" fill="freeze"/>
        <text x="256" y="262" textAnchor="middle" fontFamily="Impact,sans-serif" fontSize="56" fontWeight="bold" fill="#555" stroke="#222" strokeWidth="1.5">MISS</text>
      </g>
    </VFXCard>
  );
}
