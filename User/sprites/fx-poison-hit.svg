<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="ps-core" cx="50%" cy="52%" r="35%">
      <stop offset="0%" stop-color="#AFFFAA"/>
      <stop offset="15%" stop-color="#7CFC00"/>
      <stop offset="35%" stop-color="#2ECC71"/>
      <stop offset="60%" stop-color="#1A7A42" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0A3D1F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ps-bloom" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#2ECC71" stop-opacity="0.15"/>
      <stop offset="45%" stop-color="#0A3D1F" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ps-drop" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7CFC00"/>
      <stop offset="50%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1A7A42"/>
    </radialGradient>
    <filter id="ps-glow-strong">
      <feGaussianBlur stdDeviation="10" result="b1"/>
      <feGaussianBlur stdDeviation="4" result="b2"/>
      <feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ps-glow-med">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ps-glow-soft">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <filter id="ps-bubble">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === LAYER 0: Toxic atmosphere === -->
  <g opacity="0.06">
    <ellipse cx="230" cy="200" rx="100" ry="70" fill="#2ECC71" filter="url(#ps-glow-soft)"/>
    <ellipse cx="290" cy="310" rx="85" ry="60" fill="#1A7A42" filter="url(#ps-glow-soft)"/>
    <circle cx="256" cy="260" r="130" fill="#0A3D1F" filter="url(#ps-glow-soft)"/>
  </g>

  <!-- === LAYER 1: Outer bloom === -->
  <circle cx="256" cy="265" r="190" fill="url(#ps-bloom)"/>

  <!-- === LAYER 2: Contamination ring (corrosion boundary) === -->
  <g stroke="#1A7A42" fill="none" opacity="0.2" stroke-width="1.2">
    <circle cx="256" cy="265" r="110" stroke-dasharray="6 15 3 20 8 12"/>
    <circle cx="256" cy="265" r="125" stroke-dasharray="4 22 6 18" opacity="0.12"/>
  </g>

  <!-- === LAYER 3: Rising vapor wisps (heavy, lingering) === -->
  <g stroke="#2ECC71" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.3">
    <path d="M220,260 C215,225 225,195 218,160 C212,130 222,110 215,80"/>
    <path d="M256,255 C252,218 262,188 255,152 C250,122 258,100 252,72"/>
    <path d="M290,258 C295,222 285,192 292,155 C298,125 288,105 295,75"/>
  </g>
  <g stroke="#1A7A42" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.2">
    <path d="M205,265 C198,235 210,208 200,175 C192,148 205,128 195,98"/>
    <path d="M308,262 C315,230 305,200 312,168 C318,140 308,118 315,88"/>
  </g>
  <!-- Vapor cloud masses -->
  <g fill="#2ECC71" opacity="0.06" filter="url(#ps-glow-soft)">
    <ellipse cx="220" cy="140" rx="55" ry="35"/>
    <ellipse cx="280" cy="120" rx="45" ry="28"/>
    <ellipse cx="250" cy="100" rx="60" ry="30"/>
  </g>

  <!-- === LAYER 4: Toxic core splash === -->
  <circle cx="256" cy="268" r="58" fill="url(#ps-core)" filter="url(#ps-glow-strong)"/>
  <circle cx="256" cy="268" r="28" fill="#2ECC71" opacity="0.7" filter="url(#ps-glow-med)"/>
  <circle cx="256" cy="268" r="13" fill="#AFFFAA" opacity="0.85"/>
  <circle cx="256" cy="268" r="6" fill="#FFFFFF" opacity="0.7"/>

  <!-- === LAYER 5: Acid splash drops (organic, irregular) === -->
  <g filter="url(#ps-bubble)">
    <!-- Large primary drops -->
    <ellipse cx="162" cy="198" rx="14" ry="19" transform="rotate(-28 162 198)" fill="url(#ps-drop)" opacity="0.85"/>
    <ellipse cx="348" cy="208" rx="12" ry="17" transform="rotate(22 348 208)" fill="url(#ps-drop)" opacity="0.8"/>
    <ellipse cx="370" cy="315" rx="11" ry="15" transform="rotate(42 370 315)" fill="url(#ps-drop)" opacity="0.75"/>
    <ellipse cx="148" cy="335" rx="13" ry="17" transform="rotate(-38 148 335)" fill="url(#ps-drop)" opacity="0.8"/>
    <ellipse cx="310" cy="155" rx="10" ry="14" transform="rotate(15 310 155)" fill="url(#ps-drop)" opacity="0.7"/>
    <ellipse cx="195" cy="148" rx="11" ry="13" transform="rotate(-18 195 148)" fill="url(#ps-drop)" opacity="0.75"/>
    <!-- Medium drops -->
    <ellipse cx="130" cy="260" rx="9" ry="12" transform="rotate(-48 130 260)" fill="#2ECC71" opacity="0.65"/>
    <ellipse cx="388" cy="268" rx="8" ry="11" transform="rotate(32 388 268)" fill="#2ECC71" opacity="0.6"/>
    <ellipse cx="318" cy="388" rx="9" ry="12" transform="rotate(52 318 388)" fill="#2ECC71" opacity="0.55"/>
    <ellipse cx="188" cy="392" rx="8" ry="11" transform="rotate(-22 188 392)" fill="#2ECC71" opacity="0.6"/>
    <!-- Small trailing drops -->
    <ellipse cx="140" cy="218" rx="5" ry="7" transform="rotate(-35 140 218)" fill="#50C878" opacity="0.5"/>
    <ellipse cx="372" cy="248" rx="4" ry="6" transform="rotate(28 372 248)" fill="#50C878" opacity="0.45"/>
  </g>

  <!-- === LAYER 6: Dripping trails from large drops === -->
  <g stroke="#2ECC71" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.35">
    <path d="M162,215 C160,230 163,248 158,268"/>
    <path d="M348,225 C350,242 347,258 352,278"/>
    <path d="M148,350 C146,368 150,382 145,400"/>
    <path d="M370,330 C372,348 368,362 374,382"/>
  </g>
  <!-- Drip endpoints -->
  <g fill="#2ECC71" opacity="0.4">
    <circle cx="158" cy="270" r="3"/>
    <circle cx="352" cy="280" r="2.5"/>
    <circle cx="145" cy="402" r="2.5"/>
    <circle cx="374" cy="384" r="2"/>
  </g>

  <!-- === LAYER 7: Bubble clusters === -->
  <g fill="none" stroke="#2ECC71" stroke-width="1.5" opacity="0.5">
    <circle cx="218" cy="198" r="10"/>
    <circle cx="230" cy="190" r="6"/>
    <circle cx="300" cy="202" r="8"/>
    <circle cx="312" cy="195" r="5"/>
    <circle cx="335" cy="288" r="9"/>
    <circle cx="180" cy="305" r="7"/>
    <circle cx="192" cy="298" r="4"/>
    <circle cx="275" cy="185" r="6"/>
    <circle cx="240" cy="342" r="8"/>
    <circle cx="278" cy="348" r="5.5"/>
  </g>
  <!-- Bubble highlights -->
  <g fill="#FFFFFF" opacity="0.25">
    <circle cx="214" cy="193" r="2.5"/>
    <circle cx="296" cy="197" r="2"/>
    <circle cx="331" cy="283" r="2.5"/>
    <circle cx="177" cy="300" r="2"/>
    <circle cx="236" cy="337" r="2"/>
  </g>

  <!-- === LAYER 8: Tiny contamination particles === -->
  <g fill="#7CFC00" opacity="0.5" filter="url(#ps-bubble)">
    <circle cx="180" cy="172" r="3"/>
    <circle cx="338" cy="178" r="2.5"/>
    <circle cx="395" cy="285" r="2"/>
    <circle cx="348" cy="398" r="2.5"/>
    <circle cx="170" cy="378" r="3"/>
    <circle cx="118" cy="288" r="2.5"/>
    <circle cx="265" cy="138" r="2"/>
    <circle cx="405" cy="235" r="1.8"/>
  </g>
  <g fill="#2ECC71" opacity="0.3">
    <circle cx="155" cy="188" r="2"/>
    <circle cx="362" cy="192" r="1.5"/>
    <circle cx="408" cy="302" r="1.8"/>
    <circle cx="332" cy="408" r="1.5"/>
    <circle cx="152" cy="398" r="2"/>
    <circle cx="102" cy="272" r="1.5"/>
  </g>
  <!-- Dark corrosion particles -->
  <g fill="#0A3D1F" opacity="0.2">
    <circle cx="142" cy="205" r="2.5"/>
    <circle cx="365" cy="215" r="2"/>
    <circle cx="382" cy="342" r="2.5"/>
    <circle cx="175" cy="355" r="2"/>
    <circle cx="288" cy="415" r="2"/>
    <circle cx="228" cy="132" r="2"/>
  </g>

  <!-- === LAYER 9: Corrosion / residue marks === -->
  <g fill="#1A7A42" opacity="0.15">
    <ellipse cx="215" cy="310" rx="15" ry="5" transform="rotate(-8 215 310)"/>
    <ellipse cx="305" cy="325" rx="12" ry="4" transform="rotate(12 305 325)"/>
    <ellipse cx="256" cy="340" rx="18" ry="5" transform="rotate(-3 256 340)"/>
  </g>

  <!-- === LAYER 10: Toxic splash streaks === -->
  <g stroke="#50C878" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.25">
    <path d="M230,225 C205,195 188,172 165,148"/>
    <path d="M285,228 C312,200 335,178 358,152"/>
    <path d="M300,282 C330,288 358,292 388,298"/>
    <path d="M285,318 C308,345 328,368 352,395"/>
    <path d="M228,322 C202,348 178,372 155,398"/>
    <path d="M212,272 C182,278 155,282 125,288"/>
  </g>
</svg>