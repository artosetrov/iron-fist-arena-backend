<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dg-ghost1" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8BA4B8" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#5A7088" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3A4F60" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dg-ghost2" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#6B8BA0" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#4A6575" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2A3D4D" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dg-ghost3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4A6575" stop-opacity="0.2"/>
      <stop offset="60%" stop-color="#2A3D4D" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#1A2830" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dg-streak" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5A7088" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8BA4B8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#B0C4D8" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="dg-blur-heavy">
      <feGaussianBlur stdDeviation="12 3"/>
    </filter>
    <filter id="dg-blur-med">
      <feGaussianBlur stdDeviation="6 2"/>
    </filter>
    <filter id="dg-blur-light">
      <feGaussianBlur stdDeviation="3 1"/>
    </filter>
    <filter id="dg-glow-soft">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="dg-glow-dim">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- === LAYER 0: Subtle displacement atmosphere === -->
  <g opacity="0.04">
    <ellipse cx="256" cy="250" rx="160" ry="100" fill="#5A7088" filter="url(#dg-glow-soft)"/>
  </g>

  <!-- === LAYER 1: Air distortion arcs === -->
  <g stroke="#5A7088" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2">
    <path d="M130,165 C200,148 300,152 380,170"/>
    <path d="M125,340 C195,358 305,362 385,345"/>
  </g>
  <g stroke="#8BA4B8" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.15">
    <path d="M140,180 C210,165 295,168 370,182"/>
    <path d="M135,328 C205,342 300,345 378,332"/>
  </g>

  <!-- === LAYER 2: Afterimage 3 (furthest, most faded) === -->
  <g filter="url(#dg-blur-heavy)" opacity="0.12">
    <ellipse cx="145" cy="255" rx="28" ry="65" fill="#3A4F60"/>
    <circle cx="145" cy="190" r="20" fill="#3A4F60"/>
    <!-- Shoulder hints -->
    <ellipse cx="145" cy="215" rx="35" ry="12" fill="#3A4F60"/>
  </g>

  <!-- === LAYER 3: Afterimage 2 (mid fade) === -->
  <g filter="url(#dg-blur-med)" opacity="0.22">
    <ellipse cx="200" cy="255" rx="30" ry="68" fill="url(#dg-ghost3)"/>
    <circle cx="200" cy="188" r="22" fill="url(#dg-ghost3)"/>
    <ellipse cx="200" cy="215" rx="38" ry="13" fill="url(#dg-ghost3)"/>
  </g>

  <!-- === LAYER 4: Afterimage 1 (primary ghost, strongest) === -->
  <g filter="url(#dg-blur-light)" opacity="0.4">
    <ellipse cx="275" cy="255" rx="32" ry="72" fill="url(#dg-ghost1)"/>
    <circle cx="275" cy="185" r="24" fill="url(#dg-ghost1)"/>
    <ellipse cx="275" cy="215" rx="42" ry="14" fill="url(#dg-ghost1)"/>
  </g>
  <!-- Ghost edge highlight -->
  <g filter="url(#dg-blur-light)" opacity="0.2">
    <ellipse cx="290" cy="255" rx="28" ry="68" fill="none" stroke="#B0C4D8" stroke-width="1.5"/>
    <circle cx="290" cy="188" r="21" fill="none" stroke="#B0C4D8" stroke-width="1"/>
  </g>

  <!-- === LAYER 5: Directional speed streaks (sharp, dynamic) === -->
  <g opacity="0.55">
    <!-- Main thick streaks -->
    <line x1="95" y1="198" x2="350" y2="192" stroke="url(#dg-streak)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="108" y1="228" x2="365" y2="225" stroke="url(#dg-streak)" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="258" x2="372" y2="256" stroke="url(#dg-streak)" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="110" y1="288" x2="358" y2="286" stroke="url(#dg-streak)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="115" y1="318" x2="345" y2="315" stroke="url(#dg-streak)" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Secondary thin streaks -->
  <g stroke="#5A7088" stroke-width="1.2" stroke-linecap="round" opacity="0.35">
    <line x1="120" y1="183" x2="320" y2="180"/>
    <line x1="105" y1="213" x2="340" y2="211"/>
    <line x1="115" y1="243" x2="350" y2="242"/>
    <line x1="108" y1="273" x2="348" y2="272"/>
    <line x1="118" y1="303" x2="338" y2="301"/>
    <line x1="125" y1="333" x2="325" y2="330"/>
  </g>
  <!-- Micro streaks (fine detail) -->
  <g stroke="#8BA4B8" stroke-width="0.6" stroke-linecap="round" opacity="0.2">
    <line x1="135" y1="190" x2="290" y2="188"/>
    <line x1="128" y1="220" x2="310" y2="218"/>
    <line x1="130" y1="250" x2="305" y2="249"/>
    <line x1="132" y1="280" x2="308" y2="279"/>
    <line x1="138" y1="310" x2="295" y2="308"/>
  </g>

  <!-- === LAYER 6: Sharp accent streaks (bright, short, near destination) === -->
  <g stroke="#B0C4D8" stroke-width="1.5" stroke-linecap="round" opacity="0.4" filter="url(#dg-glow-dim)">
    <line x1="330" y1="205" x2="390" y2="203"/>
    <line x1="340" y1="235" x2="402" y2="233"/>
    <line x1="345" y1="255" x2="410" y2="254"/>
    <line x1="338" y1="275" x2="398" y2="274"/>
    <line x1="325" y1="295" x2="385" y2="293"/>
  </g>

  <!-- === LAYER 7: Dust scatter particles === -->
  <g fill="#5A7088" opacity="0.35" filter="url(#dg-glow-dim)">
    <circle cx="355" cy="348" r="4"/>
    <circle cx="375" cy="338" r="3"/>
    <circle cx="365" cy="362" r="2.5"/>
    <circle cx="340" cy="358" r="3.5"/>
    <circle cx="388" cy="352" r="2"/>
    <circle cx="350" cy="375" r="2.5"/>
    <circle cx="328" cy="368" r="2"/>
  </g>
  <!-- Finer dust -->
  <g fill="#3A4F60" opacity="0.2">
    <circle cx="398" cy="345" r="1.8"/>
    <circle cx="318" cy="378" r="1.5"/>
    <circle cx="405" cy="358" r="1.2"/>
    <circle cx="362" cy="385" r="1.5"/>
    <circle cx="345" cy="388" r="1.2"/>
  </g>

  <!-- === LAYER 8: Wind vortex marks === -->
  <g stroke="#5A7088" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.2">
    <path d="M355,218 C368,212 378,216 372,225 C368,232 358,228 362,222"/>
    <path d="M365,260 C378,255 388,260 382,270 C378,278 368,272 372,265"/>
    <path d="M348,300 C360,295 370,300 365,310 C360,318 350,312 355,305"/>
  </g>

  <!-- === LAYER 9: Ghost shadow on ground === -->
  <g opacity="0.08">
    <ellipse cx="270" cy="345" rx="80" ry="12" fill="#5A7088" filter="url(#dg-glow-soft)"/>
    <ellipse cx="195" cy="348" rx="50" ry="8" fill="#3A4F60" filter="url(#dg-glow-soft)"/>
    <ellipse cx="140" cy="350" rx="35" ry="5" fill="#2A3D4D" filter="url(#dg-glow-soft)"/>
  </g>

  <!-- === LAYER 10: Bright evasion spark (accent at destination) === -->
  <g filter="url(#dg-glow-dim)" opacity="0.3">
    <circle cx="380" cy="250" r="3" fill="#B0C4D8"/>
    <circle cx="375" cy="230" r="2" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="385" cy="270" r="2" fill="#FFFFFF" opacity="0.4"/>
  </g>
</svg>