<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexbound Combat VFX v4 — Preview</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0f; color: #ccc; font-family: 'Segoe UI', system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ============ ANIMATED PARTICLE SYSTEM ============
function Particles({ count, color, minR, maxR, spread, speed, direction = "out", style }) {
  const particles = useRef(
    Array.from({ length: count }, (_, i) => ({
      id: i,
      angle: (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5,
      dist: 20 + Math.random() * 30,
      r: minR + Math.random() * (maxR - minR),
      delay: Math.random() * speed,
      speed: speed * (0.7 + Math.random() * 0.6),
    }))
  ).current;

  return (
    <g>
      {particles.map((p) => {
        const endX = 256 + Math.cos(p.angle) * spread;
        const endY = 256 + Math.sin(p.angle) * spread;
        const startX = 256 + Math.cos(p.angle) * p.dist;
        const startY = 256 + Math.sin(p.angle) * p.dist;
        return (
          <circle key={p.id} cx={startX} cy={startY} r={p.r} fill={color} opacity="0" style={style}>
            <animate attributeName="cx" from={startX} to={endX} dur={`${p.speed}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
            <animate attributeName="cy" from={startY} to={endY} dur={`${p.speed}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;0.9;0.7;0" keyTimes="0;0.15;0.6;1" dur={`${p.speed}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
            <animate attributeName="r" from={p.r} to={p.r * 0.3} dur={`${p.speed}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
          </circle>
        );
      })}
    </g>
  );
}

// ============ RISING PARTICLES (for heal, buffs) ============
function RisingParticles({ count, colors, spread, speed }) {
  const particles = useRef(
    Array.from({ length: count }, (_, i) => ({
      id: i,
      x: 256 + (Math.random() - 0.5) * spread,
      r: 2 + Math.random() * 5,
      delay: Math.random() * speed,
      dur: speed * (0.7 + Math.random() * 0.6),
      color: colors[Math.floor(Math.random() * colors.length)],
      drift: (Math.random() - 0.5) * 30,
    }))
  ).current;

  return (
    <g>
      {particles.map((p) => (
        <circle key={p.id} cx={p.x} cy={400} r={p.r} fill={p.color} opacity="0">
          <animate attributeName="cy" from="400" to="80" dur={`${p.dur}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
          <animate attributeName="cx" from={p.x} to={p.x + p.drift} dur={`${p.dur}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;0.8;0.7;0" keyTimes="0;0.1;0.65;1" dur={`${p.dur}s`} begin={`${p.delay}s`} repeatCount="indefinite" />
        </circle>
      ))}
    </g>
  );
}

// ============ EXPANDING RINGS ============
function ShockwaveRings({ count, color, maxR, speed, strokeW = 1.5 }) {
  return (
    <g>
      {Array.from({ length: count }, (_, i) => (
        <circle key={i} cx="256" cy="256" r="30" fill="none" stroke={color} strokeWidth={strokeW} opacity="0">
          <animate attributeName="r" from="30" to={maxR} dur={`${speed}s`} begin={`${(i * speed) / count}s`} repeatCount="indefinite" />
          <animate attributeName="opacity" values="0;0.6;0.3;0" keyTimes="0;0.1;0.5;1" dur={`${speed}s`} begin={`${(i * speed) / count}s`} repeatCount="indefinite" />
          <animate attributeName="stroke-width" from={strokeW} to="0.3" dur={`${speed}s`} begin={`${(i * speed) / count}s`} repeatCount="indefinite" />
        </circle>
      ))}
    </g>
  );
}

// ============ SHARED FILTERS ============
function VFXFilters({ prefix }) {
  return (
    <defs>
      <filter id={`${prefix}-gs`}><feGaussianBlur stdDeviation="12" result="b1"/><feGaussianBlur stdDeviation="5" result="b2"/><feMerge><feMergeNode in="b1"/><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${prefix}-gm`}><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${prefix}-gl`}><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${prefix}-go`}><feGaussianBlur stdDeviation="8"/></filter>
      <filter id={`${prefix}-sp`}><feGaussianBlur stdDeviation="2"/><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <filter id={`${prefix}-mb`}><feGaussianBlur stdDeviation="8 2"/></filter>
    </defs>
  );
}

// ============ CORE GLOW (reusable volumetric core) ============
function VolumetricCore({ colors, coreR = 55, midR = 28, innerR = 14, hotR = 7, prefix, pulse = true }) {
  const [c1, c2, c3, c4 = "#FFF"] = colors;
  return (
    <g>
      <defs>
        <radialGradient id={`${prefix}-cg`} cx="50%" cy="50%" r="45%">
          <stop offset="0%" stopColor="#FFF"/>
          <stop offset="10%" stopColor={c4}/>
          <stop offset="25%" stopColor={c1}/>
          <stop offset="50%" stopColor={c2}/>
          <stop offset="75%" stopColor={c3} stopOpacity="0.4"/>
          <stop offset="100%" stopColor={c3} stopOpacity="0"/>
        </radialGradient>
      </defs>
      <circle cx="256" cy="256" r={coreR * 1.8} fill={c3} opacity="0.04" filter={`url(#${prefix}-go)`}/>
      <circle cx="256" cy="256" r={coreR} fill={`url(#${prefix}-cg)`} filter={`url(#${prefix}-gs)`}>
        {pulse && <animate attributeName="r" values={`${coreR};${coreR * 1.12};${coreR}`} dur="2s" repeatCount="indefinite"/>}
        {pulse && <animate attributeName="opacity" values="0.85;1;0.85" dur="2s" repeatCount="indefinite"/>}
      </circle>
      <circle cx="256" cy="256" r={midR} fill={c1} opacity="0.75" filter={`url(#${prefix}-gm)`}/>
      <circle cx="256" cy="256" r={innerR} fill={c4} opacity="0.92"/>
      <circle cx="256" cy="256" r={hotR} fill="#FFF"/>
    </g>
  );
}

// ============ DEBRIS FRAGMENTS ============
function Fragments({ count, color1, color2, spread, filter }) {
  const frags = useRef(
    Array.from({ length: count }, (_, i) => {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.4;
      const dist = spread * (0.6 + Math.random() * 0.4);
      const x = 256 + Math.cos(angle) * dist;
      const y = 256 + Math.sin(angle) * dist;
      const rot = Math.random() * 360;
      const size = 4 + Math.random() * 10;
      return { id: i, x, y, rot, size, color: Math.random() > 0.5 ? color1 : color2, opacity: 0.5 + Math.random() * 0.4 };
    })
  ).current;

  return (
    <g filter={filter}>
      {frags.map(f => (
        <polygon key={f.id}
          points={`${f.x},${f.y - f.size / 2} ${f.x + f.size / 3},${f.y + f.size / 3} ${f.x - f.size / 3},${f.y + f.size / 4}`}
          fill={f.color} opacity={f.opacity} transform={`rotate(${f.rot} ${f.x} ${f.y})`}
        />
      ))}
    </g>
  );
}

// ============ ENERGY RAYS ============
function EnergyRays({ count, color1, color2, minLen, maxLen, minW, maxW, filter, opacity = 0.8 }) {
  const rays = useRef(
    Array.from({ length: count }, (_, i) => {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.3;
      const len = minLen + Math.random() * (maxLen - minLen);
      const w = minW + Math.random() * (maxW - minW);
      return {
        id: i, angle, len, w,
        x2: 256 + Math.cos(angle) * len,
        y2: 256 + Math.sin(angle) * len,
        color: Math.random() > 0.5 ? color1 : color2,
        op: 0.5 + Math.random() * 0.5,
      };
    })
  ).current;

  return (
    <g filter={filter} opacity={opacity}>
      {rays.map(r => (
        <line key={r.id} x1="256" y1="256" x2={r.x2} y2={r.y2}
          stroke={r.color} strokeWidth={r.w} strokeLinecap="round" opacity={r.op}
        />
      ))}
    </g>
  );
}

      transition: "transform 0.2s, border-color 0.2s, box-shadow 0.2s", cursor: "default",
    }}
    onMouseEnter={e => { e.currentTarget.style.transform = "translateY(-4px)"; e.currentTarget.style.borderColor = borderColor; e.currentTarget.style.boxShadow = `0 10px 30px ${borderColor}22`; }}
    onMouseLeave={e => { e.currentTarget.style.transform = ""; e.currentTarget.style.borderColor = "#1A1A24"; e.currentTarget.style.boxShadow = ""; }}
    >
      <div style={{ width: "100%", aspectRatio: "1", background: "#000", display: "flex", alignItems: "center", justifyContent: "center", padding: 8, overflow: "hidden" }}>
        {children}
      </div>
      <div style={{ padding: "12px 14px", borderTop: "1px solid #1A1A24" }}>
        <div style={{ fontFamily: "'Courier New', monospace", fontSize: 13, fontWeight: 700, color: "#E0E0E0", marginBottom: 4 }}>{name}</div>
        <div style={{ fontSize: 11, color: "#777", lineHeight: 1.4, marginBottom: 8 }}>{desc}</div>
        <span className={tagClass} style={{
          display: "inline-block", padding: "2px 10px", borderRadius: 12, fontSize: 9, fontWeight: 700, letterSpacing: 1,
        }}>{tag}</span>
      </div>
    </div>
  );
}
